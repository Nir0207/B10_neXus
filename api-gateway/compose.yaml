services:
  api-gateway:
    build: .
    container_name: bionexus-api-gateway
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - SECRET_KEY=super-secret-local-dev-key
      - GATEWAY_ADMIN_USERNAME=admin
      - GATEWAY_ADMIN_PASSWORD=password
      - CORS_ALLOW_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - POSTGRES_URL=postgresql://bionexus_user:bionexus_dev_password@postgres:5432/bionexus
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=bionexus_dev_password
      - TELEMETRY_GRAPHQL_URL=http://telemetry-api:4100/graphql
      - INTELLIGENCE_API_URL=http://bionexus-intelligence-mcp:8080
    networks:
      - lake-network
      - lake-data-plane

networks:
  lake-network:
    external: true
    name: lake_bionexus-network
  lake-data-plane:
    external: true
    name: lake_bionexus-data-plane
