services:
  api-gateway:
    build:
      context: ..
      dockerfile: api-gateway/Dockerfile
    container_name: bionexus-api-gateway
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ../ops:/app/ops:ro
    environment:
      - SECRET_KEY=super-secret-local-dev-key
      - GATEWAY_ADMIN_USERNAME=admin
      - GATEWAY_ADMIN_PASSWORD=password
      - CORS_ALLOW_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - POSTGRES_URL=postgresql://bionexus_user:bionexus_dev_password@postgres:5432/bionexus
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=bionexus_dev_password
      - TELEMETRY_GRAPHQL_URL=http://telemetry-api:4100/graphql
      - INTELLIGENCE_API_URL=http://bionexus-intelligence-mcp:8080
      - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://host.docker.internal:4318/v1/logs
      - OPENOBSERVE_BASE_URL=http://host.docker.internal:5080
      - OPENOBSERVE_USERNAME=root@bionexus.local
      - OPENOBSERVE_PASSWORD=BioNexusOps123!
      - OPENOBSERVE_LOG_STREAM=bionexus_app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lake-network
      - lake-data-plane

networks:
  lake-network:
    external: true
    name: lake_bionexus-network
  lake-data-plane:
    external: true
    name: lake_bionexus-data-plane
