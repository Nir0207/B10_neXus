name: bionexus-ops

services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: bionexus-openobserve
    restart: unless-stopped
    environment:
      ZO_ROOT_USER_EMAIL: "root@bionexus.local"
      ZO_ROOT_USER_PASSWORD: "BioNexusOps123!"
      ZO_DATA_DIR: "/data"
    ports:
      - "5080:5080"
      - "5081:5081"
    volumes:
      - openobserve_data:/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.143.0
    container_name: bionexus-otel-collector
    restart: unless-stopped
    depends_on:
      - openobserve
    command:
      - "--config=/etc/otelcol-contrib/config.yaml"
    environment:
      OPENOBSERVE_OTLP_ENDPOINT: "http://openobserve:5080/api/default"
      OPENOBSERVE_AUTH_HEADER: "Basic cm9vdEBiaW9uZXh1cy5sb2NhbDpCaW9OZXh1c09wczEyMyE="
      OPENOBSERVE_LOG_STREAM: "bionexus_app"
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    volumes:
      - ./otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro

volumes:
  openobserve_data:
    driver: local
