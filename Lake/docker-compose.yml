services:
  # Refinery runtime for high-throughput ETL/loading jobs
  refinery:
    image: python:3.11-slim
    container_name: bionexus-refinery
    working_dir: /workspace
    command: ["sh", "-c", "sleep infinity"]
    volumes:
      - ..:/workspace
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-bionexus_dev_password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: bionexus
      POSTGRES_USER: bionexus_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bionexus_dev_password}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - bionexus-network
      - bionexus-data-plane

  # Postgres with pgvector for structured search and vector embeddings
  postgres:
    image: pgvector/pgvector:0.7.4-pg16
    container_name: bionexus-postgres
    environment:
      POSTGRES_DB: bionexus
      POSTGRES_USER: bionexus_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bionexus_dev_password}
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=vector"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - bionexus-network
      - bionexus-data-plane
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bionexus_user -d bionexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j for biological knowledge graph and relationship mapping
  neo4j:
    image: neo4j:5.21.0-community
    container_name: bionexus-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-bionexus_dev_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 1g
      NEO4J_dbms_memory_heap_max__size: 2g
      NEO4J_server_bolt_advertised__address: neo4j:7687
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
      - ./init-scripts/neo4j-init.cypher:/var/lib/neo4j/init.cypher
    networks:
      - bionexus-network
      - bionexus-data-plane
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB for flexible document storage and metadata
  mongodb:
    image: mongo:7.0.12
    container_name: bionexus-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: bionexus_admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-bionexus_dev_password}
      MONGO_INITDB_DATABASE: bionexus
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./init-scripts/mongodb-init.js:/docker-entrypoint-initdb.d/01-init.js
    networks:
      - bionexus-network
    healthcheck:
      test: ["CMD", "mongosh", "--authenticationDatabase", "admin", "-u", "bionexus_admin", "-p", "${MONGODB_PASSWORD:-bionexus_dev_password}", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  bionexus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.250.1.0/24
  bionexus-data-plane:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.250.0.0/24
