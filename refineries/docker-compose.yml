name: bionexus-refineries

# ─────────────────────────────────────────────────────────────────────────────
# Refineries pipeline services
#
# Prerequisite: the Lake stack must be running first so that the shared
# networks and DB containers exist:
#
#   cd ../Lake && docker compose up -d
#
# Then from this directory:
#   docker compose up pipeline          # run the full ETL once, then exit
#   docker compose run --rm test        # run pytest inside the container
#   docker compose up --build pipeline  # force rebuild before running
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Main ETL pipeline ───────────────────────────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime   # uses the lean runtime stage
    image: bionexus/refinery:latest
    container_name: bionexus-refinery-pipeline
    restart: "no"          # one-shot; exit 0 on success
    env_file:
      - .env               # create from .env.example; never commit secrets
    environment:
      # ── Resolved inside the bionexus-data-plane (service hostnames) ────────
      PG_DSN: "postgresql://${POSTGRES_USER:-bionexus_user}:${POSTGRES_PASSWORD:-bionexus_dev_password}@postgres:5432/${POSTGRES_DB:-bionexus}"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-bionexus_dev_password}"
      # ── Data paths inside the container (match Dockerfile ENV defaults) ────
      RAW_ROOT_DIR: "/data_lake/raw"
      SILVER_DIR: "/data_lake/silver"
      MANIFEST_PATH: "/data_lake/silver/.processed_manifest.json"
    volumes:
      # Raw Bronze-layer JSON (read-only inside the container)
      - ../Lake/data_lake/raw:/data_lake/raw:ro
      # Silver CSV output + idempotency manifest (read-write)
      - ../Lake/data_lake/silver:/data_lake/silver:rw
    networks:
      - bionexus-data-plane
      - bionexus-network
    depends_on:
      postgres-probe:
        condition: service_completed_successfully
      neo4j-probe:
        condition: service_completed_successfully
    command: ["run_pipeline.py"]

  # ── Test runner (pytest, no DB required) ────────────────────────────────────
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: bionexus/refinery-test:latest
    container_name: bionexus-refinery-test
    restart: "no"
    environment:
      RAW_ROOT_DIR: "/data_lake/raw"
      SILVER_DIR: "/data_lake/silver"
      MANIFEST_PATH: "/tmp/.processed_manifest.json"
    network_mode: "none"
    volumes:
      - ../Lake/data_lake/raw:/data_lake/raw:ro
      - ../Lake/data_lake/silver:/data_lake/silver:rw
    # No network needed — all DB calls are mocked
    command: ["-m", "pytest", "tests/", "-v", "--tb=short"]

  # ── Readiness probes (lightweight; avoid depending on full Lake compose) ────
  postgres-probe:
    image: postgres:16-alpine
    container_name: bionexus-refinery-pg-probe
    restart: "no"
    entrypoint: >
      sh -c "
        until pg_isready -h postgres -U ${POSTGRES_USER:-bionexus_user} -d ${POSTGRES_DB:-bionexus}; do
          echo 'Waiting for Postgres...'; sleep 2;
        done;
        echo 'Postgres ready.';
      "
    networks:
      - bionexus-data-plane
    environment:
      PGPASSWORD: "${POSTGRES_PASSWORD:-bionexus_dev_password}"

  neo4j-probe:
    image: curlimages/curl:8.7.1
    container_name: bionexus-refinery-neo4j-probe
    restart: "no"
    entrypoint: >
      sh -c "
        until curl --silent --fail http://neo4j:7474; do
          echo 'Waiting for Neo4j...'; sleep 3;
        done;
        echo 'Neo4j ready.';
      "
    networks:
      - bionexus-network

# ── External networks (defined by the Lake stack) ────────────────────────────
networks:
  bionexus-data-plane:
    external: true
    name: lake_bionexus-data-plane
  bionexus-network:
    external: true
    name: lake_bionexus-network
